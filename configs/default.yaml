# FlowClean training configuration

# --------------- Data ---------------
data:
  sample_rate: 16000
  segment_length: 32000                 # ~2 seconds at 16 kHz

# --------------- STFT ---------------
stft:
  n_fft: 510
  hop_length: 128
  win_length: 510

# --------------- Model ---------------
model:
  base_channels: 64
  num_levels: 4
  time_dim: 256

# --------------- Loss ---------------
loss:
  lambda_mr_stft: 0.1                  # weight for multi-resolution STFT loss
  mr_stft:
    fft_sizes: [512, 1024, 2048]
    hop_sizes: [120, 240, 480]
    win_sizes: [512, 1024, 2048]

# --------------- Training ---------------
training:
  epochs: 200
  batch_size: 8
  lr: 2.0e-4
  weight_decay: 1.0e-6
  grad_clip: 1.0
  num_workers: 4
  seed: 42

  # Learning rate scheduler (cosine annealing)
  scheduler:
    type: "cosine"
    warmup_epochs: 5
    min_lr: 1.0e-6

  # Checkpointing
  save_every: 10                        # save checkpoint every N epochs
  log_every: 100                        # log every N steps
  checkpoint_dir: "./checkpoints"

# --------------- Inference ---------------
inference:
  ode_steps: 10                         # K in {1, 2, 5, 10, 20}
  solver: "euler"                       # "euler" or "heun"

# --------------- Wandb (optional) ---------------
wandb:
  use_wandb: false
  project: "flowclean"
  
