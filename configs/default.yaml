# FlowClean training configuration (Phase 0 baseline)
# Phase 0 changes vs original:
#   - lr 2e-4 -> 1e-4 (matches SGMSE+ / StoRM / FlowSE / MeanFlowSE)
#   - epochs 100 -> 200
#   - SGMSE+-style power-law compression on the complex STFT (alpha=0.5, beta=0.15)
#   - EMA on model weights (decay=0.999); inference loads EMA by default

# --------------- Data ---------------
data:
  sample_rate: 16000
  segment_length: 32000                 # ~2 seconds at 16 kHz

# --------------- STFT ---------------
stft:
  n_fft: 510
  hop_length: 128
  win_length: 510
  compress_alpha: 0.5                   # |z|^alpha
  compress_beta: 0.15                   # scale factor

# --------------- Model ---------------
model:
  base_channels: 64
  num_levels: 4
  time_dim: 256

# --------------- Loss ---------------
loss:
  lambda_mr_stft: 0.1                   # weight for multi-resolution STFT loss
  mr_stft:
    fft_sizes: [512, 1024, 2048]
    hop_sizes: [120, 240, 480]
    win_sizes: [512, 1024, 2048]

# --------------- Training ---------------
training:
  epochs: 200
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-6
  grad_clip: 1.0
  num_workers: 0
  seed: 42

  use_ema: true
  ema_decay: 0.999

  scheduler:
    type: "cosine"
    warmup_epochs: 5
    min_lr: 1.0e-6

  save_every: 10
  log_every: 100
  checkpoint_dir: "./checkpoints/phase0_baseline"

# --------------- Inference ---------------
inference:
  ode_steps: 10                         # K in {1, 2, 5, 10, 20}
  solver: "euler"                       # "euler" or "heun"

# --------------- Wandb (optional) ---------------
wandb:
  use_wandb: true
  project: "Flowclean"
